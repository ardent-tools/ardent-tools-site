# GitHub Actions workflow for typikon-consuming sites.
#
# This file is a TEMPLATE. typikon-init copies it to a consumer site as
# .github/workflows/deploy.yml during scaffolding, substituting the two
# placeholders below.
#
# Placeholders (typikon-init replaces during scaffolding):
#   ardent-tools   — Cloudflare Pages project slug (e.g. ardent-site)
#   0.22.1   — pinned Zola version (current: 0.22.1)
#
# After substitution the workflow performs the strict gate, then deploys
# to Cloudflare Pages on green pushes or recovery dispatches from main.
#
# Secrets the consumer must set in GitHub repo settings:
#   - CLOUDFLARE_API_TOKEN
#   - CLOUDFLARE_ACCOUNT_ID

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Recovery path when webhook delivery is degraded. Manual runs still execute
  # the same strict gate, pinned deployment, and live production verifier.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          submodules: recursive  # Pulls typikon as themes/typikon/
          persist-credentials: false
          fetch-depth: 0  # Retention history is proved against the event's trusted base SHA.

      # ── Tooling install ────────────────────────────────────────
      - name: Install Zola
        env:
          # Pinned per typikon Stage 2a. Refresh when ZOLA_VERSION bumps via:
          #   curl -sL https://github.com/getzola/zola/releases/download/v<X>/zola-v<X>-x86_64-unknown-linux-gnu.tar.gz | sha256sum
          ZOLA_SHA256: 0ca09aa40376aaa9ddfb512ff9ad963262ef95edb0d0f2d5ec6961b6f5cf22ef
        run: |
          curl -L "https://github.com/getzola/zola/releases/download/v0.22.1/zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz" \
            -o zola.tar.gz
          echo "${ZOLA_SHA256}  zola.tar.gz" | sha256sum -c
          tar -xzf zola.tar.gz
          sudo mv zola /usr/local/bin/
          zola --version

      - name: Install Python deps for typikon-validate
        run: |
          python3 -m pip install --user jsonschema==4.26.0

      - name: Install Typst and PDF inspection tools
        env:
          TYPST_VERSION: 0.14.2
          TYPST_SHA256: a6044cbad2a954deb921167e257e120ac0a16b20339ec01121194ff9d394996d
        run: |
          curl -L "https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" \
            -o typst.tar.xz
          echo "${TYPST_SHA256}  typst.tar.xz" | sha256sum -c
          mkdir -p typst-extract
          tar -xJf typst.tar.xz -C typst-extract --strip-components=1
          sudo mv typst-extract/typst /usr/local/bin/
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          typst --version

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          # WHY: wrangler (deploy step) requires Node >=22; 20 fails the deploy.
          node-version: '22'

      - name: Install pa11y-ci, lychee, playwright
        env:
          # lychee pinned to a specific version (releases/latest is non-reproducible).
          # Refresh when LYCHEE_VERSION bumps via:
          #   curl -sL https://github.com/lycheeverse/lychee/releases/download/lychee-v<X>/lychee-x86_64-unknown-linux-gnu.tar.gz | sha256sum
          LYCHEE_VERSION: 0.24.2
          LYCHEE_SHA256: 1f4e0ef7f6554a6ed33dd7ac144fb2e1bbed98598e7af973042fc5cd43951c9a
        run: |
          npm install -g pa11y-ci@4.1.1 @playwright/test@1.61.1
          npx playwright install --with-deps chromium
          curl -L "https://github.com/lycheeverse/lychee/releases/download/lychee-v${LYCHEE_VERSION}/lychee-x86_64-unknown-linux-gnu.tar.gz" \
            -o lychee.tar.gz
          echo "${LYCHEE_SHA256}  lychee.tar.gz" | sha256sum -c
          mkdir -p lychee-extract
          tar -xzf lychee.tar.gz -C lychee-extract --strip-components=1
          sudo mv lychee-extract/lychee /usr/local/bin/
          rm -rf lychee.tar.gz lychee-extract

      # ── Strict gate ────────────────────────────────────────────
      - name: Select prior asset-retention authority
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          bootstrap=0
          case "$EVENT_NAME" in
            pull_request)
              if [[ ! "$PR_BASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
                echo "Pull-request retention base is absent or malformed." >&2
                exit 1
              fi
              base_revision="$PR_BASE_SHA"
              ;;
            push)
              if [[ "$PUSH_BEFORE_SHA" == 0000000000000000000000000000000000000000 ]]; then
                parent_record=$(git rev-list --parents -n 1 HEAD)
                read -r _head base_revision _rest <<< "$parent_record"
                if [[ -n "${base_revision:-}" ]]; then
                  echo "A created main ref has prior commit history; retention bootstrap is forbidden." >&2
                  exit 1
                fi
                bootstrap=1
              elif [[ "$PUSH_BEFORE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
                base_revision="$PUSH_BEFORE_SHA"
              else
                echo "Push retention base is absent or malformed." >&2
                exit 1
              fi
              ;;
            workflow_dispatch)
              parent_record=$(git rev-list --parents -n 1 HEAD)
              read -r _head base_revision _rest <<< "$parent_record"
              if [[ -z "${base_revision:-}" ]]; then
                bootstrap=1
              fi
              ;;
            *) echo "unsupported event for retention authority: $EVENT_NAME" >&2; exit 1 ;;
          esac
          if [[ "$bootstrap" == 1 ]]; then
            echo "HEAD is the repository root commit; retention bootstrap is authorized."
          elif [[ ! "$base_revision" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Trusted retention base is malformed: $base_revision" >&2
            exit 1
          elif ! git cat-file -e "${base_revision}^{commit}" 2>/dev/null; then
            echo "Trusted retention base commit is unavailable: $base_revision" >&2
            exit 1
          elif git cat-file -e "${base_revision}:asset-retention.json" 2>/dev/null; then
            prior_ledger="$RUNNER_TEMP/prior-asset-retention.json"
            git show "${base_revision}:asset-retention.json" > "$prior_ledger"
            echo "ARDENT_RETENTION_BASE_LEDGER=$prior_ledger" >> "$GITHUB_ENV"
          else
            echo "Base revision has no retention ledger; treating this as retention bootstrap."
          fi

      - name: Repository-owned isolated strict gate
        env:
          # Retain the exact production tree the helper validates; normal
          # local runs remain temporary and leave the worktree unchanged.
          ARDENT_RETAIN_VALIDATED_PUBLIC: '1'
          ARDENT_BUILD_REVISION: ${{ github.sha }}
        run: python3 bin/site.py gate

      - name: Compile the Pages error boundary
        run: |
          npm install -g wrangler@4.112.0
          wrangler pages functions build functions \
            --outfile "$RUNNER_TEMP/ardent-pages-worker.js"

      # ── Deploy green main revisions ───────────────────────────
      - name: Deploy to Cloudflare Pages
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_SHA: ${{ github.sha }}
          WRANGLER_OUTPUT_FILE_PATH: ${{ runner.temp }}/ardent-wrangler-output.jsonl
        run: |
          python3 bin/validate-site.py public --expected-revision "$GITHUB_SHA"
          wrangler pages deploy --branch=main --commit-hash "$GITHUB_SHA"
          immutable_url=$(python3 bin/pages_deployment_receipt.py \
            "$WRANGLER_OUTPUT_FILE_PATH" \
            --expected-revision "$GITHUB_SHA" \
            --project ardent-tools \
            --production-branch main)
          echo "ARDENT_IMMUTABLE_URL=$immutable_url" >> "$GITHUB_ENV"

      - name: Verify live authored/runtime boundary
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # The Pages Function/header plane can converge route-by-route after
          # Wrangler returns; retain a six-minute sleep budget for the full proof.
          python3 bin/verify-production.py \
            --base-url "$ARDENT_IMMUTABLE_URL" \
            --canonical-origin https://ardent.tools \
            --require-cf-ray \
            --require-logical-alias-tombstones \
            --attempts 37 --delay 10 \
            --expected-revision "$GITHUB_SHA" \
            --artifact-root public
          python3 bin/verify-production.py \
            --base-url https://ardent.tools \
            --canonical-origin https://ardent.tools \
            --require-cf-ray \
            --attempts 13 --delay 10 \
            --expected-revision "$GITHUB_SHA" \
            --artifact-root public
