schema_version = 4
manifest_name = "release-resources.json"

# These protocol, discovery, or runtime-authority endpoints remain stable and
# no-store. Every other served non-HTML member is emitted under a full-SHA-256
# physical path. Control files and the manifest itself remain outside the
# resource member set.
canonical_paths = [
  "atom.xml",
  "build-revision.txt",
  "career-claims.json",
  "llms.txt",
  "release-html.json",
  "robots.txt",
  "runtime-boundary.json",
  "sitemap.xml",
  "systems.json",
]

[[tombstones]]
path = "/tapes/aletheia-memory.tape"
retain_through = "2026-08-21"
reason = "Removed after an immutable predecessor response; retain through its 30-day browser-cache window."
