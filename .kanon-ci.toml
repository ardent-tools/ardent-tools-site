# archetype:
# forge-only: false
# spdx:

# ardent-tools-site CI pipeline for the forge post-receive hook.
#
# The full strict gate (typikon-validate + zola check + zola build +
# csp-enforce + lychee + pa11y + playwright + Cloudflare Pages deploy)
# lives in .github/workflows/deploy.yml — that's where the real CI runs,
# on the GitHub mirror, since wrangler is the only tested Cloudflare
# Pages deploy path (matches the pinned typikon SHA's own scaffold
# output — ci/kanon-ci.toml.tmpl doesn't exist yet at this pin; a later
# typikon-refresh may replace this stage with a rendered multi-stage
# file once that template lands). The forge post-receive trigger runs
# kanon lint against this repo's own tracked files, scoped away from
# themes/typikon (a separate repo, gated by its own CI) via a
# git-ls-files pathspec exclusion piped into --paths-from.

[pipeline]
stages = ["kanon-lint"]

[stages."kanon-lint"]
cmd = "sh -c 'f=$(mktemp) && git ls-files -- . \":!themes/typikon\" > \"$f\" && kanon lint --paths-from \"$f\" .; rc=$?; rm -f \"$f\"; exit $rc'"
timeout_secs = 120

[verifier]
enabled = false
