# archetype:
# forge-only: false
# spdx:

# Dormant local Kanon pipeline configuration. This direct-GitHub repository is
# not forge-onboarded, so no Kanon post-receive hook consumes this file today.
#
# The full strict gate (typikon-validate + zola check + zola build +
# csp-enforce + lychee + pa11y + playwright + Cloudflare Pages deploy)
# lives in .github/workflows/deploy.yml — that's where the real CI runs
# in the authoritative GitHub repository, since Wrangler is the only tested Cloudflare
# Pages deploy path (matches the pinned typikon SHA's own scaffold
# output — ci/kanon-ci.toml.tmpl doesn't exist yet at this pin; a later
# typikon-refresh may replace this stage with a rendered multi-stage
# file once that template lands). An operator may run this stage locally;
# it scopes Kanon lint away from themes/typikon (a separate repository,
# gated independently) via a git-ls-files exclusion piped into --paths-from.

[pipeline]
stages = ["kanon-lint"]

[stages."kanon-lint"]
cmd = "sh -c 'f=$(mktemp) && git ls-files -- . \":!themes/typikon\" > \"$f\" && kanon lint --paths-from \"$f\" .; rc=$?; rm -f \"$f\"; exit $rc'"
timeout_secs = 120

[verifier]
enabled = false
